<div class="dialog-wrapper">
  <h2 mat-dialog-title class="dialog-title">確認送出</h2>
  <mat-dialog-content class="dialog-content">
    <p>您即將送出問卷內容，送出後將無法修改。</p>
    <p class="sub-text">確定要送出嗎？</p>
  </mat-dialog-content>
  <mat-dialog-actions align="end" class="dialog-actions">
    <button class="btn-cancel" (click)="onNoClick()">回頭檢查</button>
    <button class="btn-confirm" (click)="onClick()">確認送出</button>
  </mat-dialog-actions>
</div>
