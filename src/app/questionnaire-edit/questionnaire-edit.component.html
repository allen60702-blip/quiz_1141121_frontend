<div class="divCss1">
  <h2>修改問卷 (ID: {{ quizId }})</h2>

  <div class="divCss2">
    <fieldset class="section-box">
      <legend>1. 問卷基本資料</legend>
      <div class="form-group">
        <label>問卷名稱：</label>
        <input type="text" [(ngModel)]="quizObj.title" class="inputData" placeholder="請輸入標題">
      </div>
      <div class="form-group">
        <label>問卷說明：</label>
        <textarea [(ngModel)]="quizObj.description" class="textareaBasic"></textarea>
      </div>
      <div class="form-group date-row">
        <label>開始日期：</label>
        <input type="date" [(ngModel)]="quizObj.startDate">
        <label style="margin-left: 20px;">結束日期：</label>
        <input type="date" [(ngModel)]="quizObj.endDate">
      </div>
    </fieldset>

    <fieldset class="section-box" style="margin-top: 30px;">
      <legend>2. 題目設計</legend>

      @for(q of questionList; track q.questionId; let i = $index) {
        <div class="question-edit-card">
          <div class="card-header">
            <span>題目 {{ q.questionId }}</span>
            <button type="button" class="btn-delete" (click)="deleteQuestion(i)">刪除</button>
          </div>

          <div class="form-group">
            <label>題目內容：</label>
            <input type="text" [(ngModel)]="q.question" class="inputData" style="width: 70%;">
            <label style="margin-left: 10px;">
              <input type="checkbox" [(ngModel)]="q.required"> 必填
            </label>
          </div>

          <div class="form-group">
            <label>回答類型：</label>
            <select [(ngModel)]="q.type" class="inputSelect">
              <option value="Single">單選</option>
              <option value="Multi">多選</option>
              <option value="Text">簡答文字</option>
            </select>
          </div>

          @if(q.type !== 'Text') {
            <div class="form-group">
              <label>選項設定：</label>
              <input type="text" [(ngModel)]="q.options" class="inputData"
                     placeholder="選項請用分號分隔">
            </div>
          }
        </div>
      }

      <button type="button" (click)="addQuestion()" class="btn-add-q">+ 新增題目</button>
    </fieldset>
  </div>

  <div class="divCss3">
    <button type="button" routerLink="/questionnaire-manager" class="btnCss1">取消修改</button>
    <button type="button" (click)="update()" class="btnCss1" style="background: #FFD6A5;">確認更新</button>
  </div>
</div>
